<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password — AI Security Platform</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="login.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
/* Error alert */
.err-msg {
  align-items:center; gap:9px;
  background:rgba(255,80,80,.08);
  border:1px solid rgba(255,80,80,.3);
  border-left:3px solid #ff5050;
  border-radius:10px;
  padding:11px 14px;
  font-size:13px; color:#ff8080;
  line-height:1.5;
  animation:errIn .25s ease both;
}
.err-msg i { font-size:14px; color:#ff5050; flex-shrink:0; }
@keyframes errIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

/* OTP digit boxes */
.otp-wrap { display:flex; gap:10px; justify-content:center; margin:4px 0; }
.otp-wrap input {
  width:46px; height:54px; text-align:center;
  font-size:22px; font-weight:700; font-family:monospace;
  background:rgba(11,22,40,.7); border:1.5px solid var(--border);
  border-radius:10px; color:var(--text); outline:none;
  transition:border-color .2s, box-shadow .2s;
  caret-color:var(--primary);
}
.otp-wrap input:focus {
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(34,184,207,.14);
}
.otp-wrap input.filled { border-color:rgba(34,184,207,.6); }

/* strength bar */
.strength-bar { display:flex; gap:4px; margin-top:6px; }
.strength-bar span { flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,.1); transition:background .3s; }
.strength-label { font-size:11px; color:#8ea0b8; margin-top:4px; }

/* step indicator */
.step-dots { display:flex; gap:8px; justify-content:center; margin-bottom:20px; }
.step-dots span {
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,.15); transition:all .3s;
}
.step-dots span.active { background:var(--primary); width:24px; border-radius:4px; }
.step-dots span.done   { background:rgba(34,184,207,.4); }

/* success & timer */
.success-box { display:none; flex-direction:column; align-items:center; gap:14px; text-align:center; padding:10px 0 6px; }
.success-ico {
  width:64px; height:64px; border-radius:50%;
  background:rgba(34,207,100,.12); border:1px solid rgba(34,207,100,.35);
  display:grid; place-items:center; font-size:28px; color:#22c55e;
  animation:pop .5s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes pop { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
.timer { font-size:12px; color:#8ea0b8; display:flex; align-items:center; gap:6px; }
.timer strong { color:#22b8cf; font-variant-numeric:tabular-nums; }
.resend-btn { background:none; border:none; color:var(--primary); cursor:pointer; font-size:13px; font-weight:600; padding:0; }
.resend-btn:disabled { color:#8ea0b8; cursor:default; }
.info-note { background:rgba(34,184,207,.07); border:1px solid rgba(34,184,207,.2); border-radius:10px; padding:11px 14px; font-size:12px; color:#8ea0b8; display:flex; gap:10px; align-items:flex-start; }
.info-note i { color:#22b8cf; flex-shrink:0; margin-top:1px; }
</style>
</head>
<body class="login-page">

<div class="auth-bg">
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particles"></canvas>
</div>

<main class="auth-wrap">
  <div class="auth-card reveal visible">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-logo" id="brandIco">
        <i class="fa-solid fa-key"></i>
        <span class="pulse-ring"></span>
      </div>
      <h1 id="brandTitle">Forgot Password</h1>
      <p class="muted" id="brandSub">Enter your email to receive a verification code</p>
    </div>

    <!-- Step dots -->
    <div class="step-dots">
      <span id="dot1" class="active"></span>
      <span id="dot2"></span>
      <span id="dot3"></span>
    </div>

    <!-- ── STEP 1: Email ── -->
    <form class="auth-form" id="step1" novalidate>
      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input id="email" type="email" placeholder="your-email@example.com" required/>
        </div>
      </div>
      <div class="info-note">
        <i class="fa-solid fa-circle-info"></i>
        <span>A 6-digit code will be sent to this email. Check your spam folder if not received.</span>
      </div>
      <div id="err1" class="err-msg" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-block" id="btn1">
        <i class="fa-solid fa-paper-plane"></i><span>Send Code</span>
      </button>
    </form>

    <!-- ── STEP 2: OTP Code ── -->
    <form class="auth-form" id="step2" style="display:none" novalidate>
      <div class="field" style="gap:10px">
        <label style="text-align:center">Enter the 6-digit code sent to <strong id="sentTo" style="color:#22b8cf"></strong></label>
        <div class="otp-wrap">
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        </div>
        <div class="timer" style="justify-content:center">
          <i class="fa-regular fa-clock"></i>
          Code expires in <strong id="timerVal">10:00</strong>
        </div>
        <div style="text-align:center;font-size:13px;color:#8ea0b8">
          Didn't receive it?
          <button type="button" class="resend-btn" id="resendBtn" disabled>Resend Code</button>
          <span id="resendTimer" style="color:#8ea0b8;font-size:12px"></span>
        </div>
      </div>
      <div id="err2" class="err-msg" style="display:none;color:#ff6b6b;font-size:13px;text-align:center;padding:4px 0"></div>
      <button type="submit" class="btn btn-primary btn-block" id="btn2">
        <i class="fa-solid fa-check"></i><span>Verify Code</span>
      </button>
    </form>

    <!-- ── STEP 3: New Password ── -->
    <form class="auth-form" id="step3" style="display:none" novalidate>
      <div class="field">
        <label for="newPass">New Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input id="newPass" type="password" placeholder="At least 8 characters" required/>
          <button type="button" class="toggle-pass" id="toggleNew"><i class="fa-solid fa-eye"></i></button>
        </div>
        <div class="strength-bar" id="strengthBar">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="field">
        <label for="confirmPass">Confirm Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input id="confirmPass" type="password" placeholder="Repeat your new password" required/>
          <button type="button" class="toggle-pass" id="toggleConfirm"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div id="err3" class="err-msg" style="display:none;color:#ff6b6b;font-size:13px;text-align:center;padding:4px 0"></div>
      <button type="submit" class="btn btn-primary btn-block" id="btn3">
        <i class="fa-solid fa-shield-check"></i><span>Update Password</span>
      </button>
    </form>

    <!-- ── SUCCESS ── -->
    <div class="success-box" id="successBox">
      <div class="success-ico"><i class="fa-solid fa-shield-check"></i></div>
      <div style="font-size:18px;font-weight:700;color:#e6edf7">Password Updated!</div>
      <div style="font-size:13px;color:#8ea0b8;line-height:1.6">Your password has been changed.<br>Redirecting to Sign In…</div>
      <a href="login.html" class="btn btn-primary btn-block" style="margin-top:8px">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In Now
      </a>
    </div>

    <a href="login.html" class="back-home" id="backLink"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a>
  </div>
</main>

<script src="api.js"></script>
<script>
(function(){
  let userEmail = '';
  let otpCode   = '';
  let countdown = null;

  // ── helpers ──
  function showStep(n) {
    ['step1','step2','step3','successBox'].forEach((id,i) => {
      const el = document.getElementById(id);
      if (el) el.style.display = (i === n - 1) ? (n === 4 ? 'flex' : 'flex') : 'none';
    });
    // step visibility
    document.getElementById('step1').style.display    = n===1 ? 'flex' : 'none';
    document.getElementById('step2').style.display    = n===2 ? 'flex' : 'none';
    document.getElementById('step3').style.display    = n===3 ? 'flex' : 'none';
    document.getElementById('successBox').style.display = n===4 ? 'flex' : 'none';
    // dots
    ['dot1','dot2','dot3'].forEach((id, i) => {
      const d = document.getElementById(id);
      d.className = i+1 < n ? 'done' : (i+1 === n ? 'active' : '');
    });
    // brand
    const icons  = ['fa-key','fa-shield-halved fa-rotate-90','fa-lock-open','fa-shield-check'];
    const titles = ['Forgot Password','Enter Verification Code','Set New Password','Password Updated!'];
    const subs   = ['Enter your email to receive a code','Check your email for the 6-digit code','Choose a strong new password','You can now sign in with your new password'];
    document.getElementById('brandIco').innerHTML  = `<i class="fa-solid ${icons[n-1]}"></i><span class="pulse-ring"></span>`;
    document.getElementById('brandTitle').textContent = titles[n-1];
    document.getElementById('brandSub').textContent   = subs[n-1];
    document.getElementById('backLink').style.display = n===4 ? 'none' : 'block';
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> ${msg}`;
    el.style.display = 'flex';
    const form = el.closest('form');
    if (form) { form.classList.add('shake'); form.addEventListener('animationend', () => form.classList.remove('shake'), { once:true }); }
  }
  function clearErr(id) { const e = document.getElementById(id); e.style.display='none'; e.textContent=''; }
  function setLoading(btnId, on) { const b = document.getElementById(btnId); b.classList.toggle('loading',on); b.disabled=on; }

  // ── OTP input keyboard handling ──
  const digits = document.querySelectorAll('.otp-digit');
  digits.forEach((inp, i) => {
    inp.addEventListener('input', e => {
      const v = e.target.value.replace(/\D/g,'');
      e.target.value = v;
      e.target.classList.toggle('filled', v !== '');
      if (v && i < 5) digits[i+1].focus();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) { digits[i-1].focus(); digits[i-1].value=''; digits[i-1].classList.remove('filled'); }
    });
    inp.addEventListener('paste', e => {
      e.preventDefault();
      const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      [...paste].forEach((ch, j) => { if (digits[j]) { digits[j].value=ch; digits[j].classList.add('filled'); } });
      if (paste.length > 0) digits[Math.min(paste.length, 5)].focus();
    });
  });
  function getOtpValue() { return [...digits].map(d => d.value).join(''); }

  // ── Countdown timer ──
  function startCountdown(seconds) {
    clearInterval(countdown);
    const el = document.getElementById('timerVal');
    let remaining = seconds;
    const tick = () => {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      el.textContent = `${m}:${String(s).padStart(2,'0')}`;
      if (remaining <= 0) { clearInterval(countdown); el.textContent = '0:00'; el.style.color='#ff6b6b'; }
      remaining--;
    };
    tick(); countdown = setInterval(tick, 1000);
    // enable resend after 60s
    const resendBtn   = document.getElementById('resendBtn');
    const resendTimer = document.getElementById('resendTimer');
    resendBtn.disabled = true;
    let resendSec = 60;
    const resendTick = setInterval(() => {
      resendSec--;
      resendTimer.textContent = `(${resendSec}s)`;
      if (resendSec <= 0) { clearInterval(resendTick); resendBtn.disabled=false; resendTimer.textContent=''; }
    }, 1000);
  }

  // ── STEP 1: Send code ──
  document.getElementById('step1').addEventListener('submit', async e => {
    e.preventDefault(); clearErr('err1');
    const email = document.getElementById('email').value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('err1','Please enter a valid email address.'); return; }
    setLoading('btn1', true);
    try {
      await AisecAPI.forgotPassword(email);
      userEmail = email;
      document.getElementById('sentTo').textContent = email;
      showStep(2);
      startCountdown(600);
      digits[0].focus();
    } catch(err) { showErr('err1', err.message || 'Failed to send code. Try again.'); }
    finally { setLoading('btn1', false); }
  });

  // ── Resend ──
  document.getElementById('resendBtn').addEventListener('click', async () => {
    try {
      await AisecAPI.forgotPassword(userEmail);
      startCountdown(600);
      digits.forEach(d => { d.value=''; d.classList.remove('filled'); });
      digits[0].focus();
    } catch {}
  });

  // ── STEP 2: Verify code ──
  document.getElementById('step2').addEventListener('submit', async e => {
    e.preventDefault(); clearErr('err2');
    const code = getOtpValue();
    if (code.length < 6) { showErr('err2','Please enter all 6 digits.'); return; }
    setLoading('btn2', true);
    try {
      await AisecAPI.verifyResetCode(userEmail, code);
      otpCode = code;
      showStep(3);
      document.getElementById('newPass').focus();
    } catch(err) { showErr('err2', err.message || 'Invalid or expired code.'); }
    finally { setLoading('btn2', false); }
  });

  // ── Password strength ──
  const strengthColors = ['#ef4444','#f97316','#eab308','#22c55e'];
  const strengthLabels = ['Weak','Fair','Good','Strong'];
  document.getElementById('newPass').addEventListener('input', function() {
    const v = this.value; let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    document.querySelectorAll('#strengthBar span').forEach((b,i) => {
      b.style.background = i < score ? strengthColors[score-1] : 'rgba(255,255,255,.1)';
    });
    const lbl = document.getElementById('strengthLabel');
    lbl.textContent = v.length ? (strengthLabels[score-1] || '') : '';
    lbl.style.color  = v.length ? (strengthColors[score-1] || '') : '';
  });

  // Toggle password visibility
  document.getElementById('toggleNew').addEventListener('click',    () => toggleVis('newPass','toggleNew'));
  document.getElementById('toggleConfirm').addEventListener('click',() => toggleVis('confirmPass','toggleConfirm'));
  function toggleVis(inpId, btnId) {
    const inp = document.getElementById(inpId);
    const ic  = document.querySelector('#'+btnId+' i');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ic.className = inp.type === 'text' ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
  }

  // ── STEP 3: Reset password ──
  document.getElementById('step3').addEventListener('submit', async e => {
    e.preventDefault(); clearErr('err3');
    const newPass     = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;
    if (newPass.length < 8)      { showErr('err3','Password must be at least 8 characters.'); return; }
    if (newPass !== confirmPass) { showErr('err3','Passwords do not match.'); return; }

    setLoading('btn3', true);
    try {
      await AisecAPI.resetPassword(userEmail, otpCode, newPass);
      showStep(4);
      setTimeout(() => { window.location.href = 'login.html'; }, 4000);
    } catch(err) {
      const msg = err.message || 'Failed to reset password.';
      if (msg.toLowerCase().includes('invalid') || msg.toLowerCase().includes('expired')) {
        showStep(2);
        showErr('err2', msg + ' Please request a new code.');
      } else {
        showErr('err3', msg);
      }
    } finally { setLoading('btn3', false); }
  });

  // Init
  showStep(1);
})();
</script>
</body>
</html>
