spring:
  datasource:
    url: jdbc:h2:mem:aisec_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
    open-in-view: false
  jackson:
    property-naming-strategy: SNAKE_CASE

app:
  cors:
    allowed-origins: "*"
  ml:
    base-url: "http://127.0.0.1:0"
    connect-timeout-ms: 100
    read-timeout-ms: 100
  jwt:
    secret: "dGVzdC1zZWNyZXQtMzItYnl0ZXMtZm9yLWp3dC1zaWduaW5nLWFhYWE="
    expiration-ms: 3600000
  seed:
    enabled: false

logging:
  level:
    com.aisec.backend: WARN
    org.hibernate.SQL: WARN
