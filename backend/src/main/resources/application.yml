server:
  port: ${PORT:8080}

spring:
  application:
    name: ai-security-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/ai_ids}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:aisec}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:aisec_pass}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # db/init.sql is loaded by PostgreSQL on first boot (docker-entrypoint-initdb.d).
      # update = reconcile any missing columns without dropping data (safe for upgrades).
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 2560MB
      max-request-size: 2600MB
  jackson:
    property-naming-strategy: SNAKE_CASE
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:MADRS.support@gmail.com}
    password: ${MAIL_PASSWORD:oikwqicakyynhpie}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

app:
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,null,https://madrs-demo.loca.lt,https://aisecurity-production-2ed9.up.railway.app,https://backend-production-04542.up.railway.app"
  ml:
    base-url: ${ML_SERVICE_URL:http://127.0.0.1:8001}
    connect-timeout-ms: 5000
    read-timeout-ms: 1200000
  jwt:
    # SECURITY: MUST set JWT_SECRET env var in production. Default is insecure demo key.
    # Generate with: openssl rand -base64 32
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXBsZWFzZS10aGlzLWlzLWEtZGVtby1zZWNyZXQtMTIzNA==}
    expiration-ms: 604800000  # 7 days
  seed:
    enabled: true
  frontend-url: ${FRONTEND_URL:http://127.0.0.1:5500}
  firewall:
    # auto = use nftables if `nft` is on PATH and exec is permitted, else NoOp.
    # Override to "nftables" to force-fail loud, or "noop" to disable enforcement entirely.
    enforcer: ${FIREWALL_ENFORCER:auto}
    nft-path: ${FIREWALL_NFT_PATH:}
    use-sudo: ${FIREWALL_USE_SUDO:true}
  threat-intel:
    # auto = AbuseIPDB if key set, else deterministic mock for dev/demo.
    provider: ${THREAT_INTEL_PROVIDER:auto}
    abuseipdb-key: ${ABUSEIPDB_KEY:}
    abuseipdb-base-url: https://api.abuseipdb.com/api/v2
    cache-ttl-hours: 24
    request-timeout-ms: 5000
  security:
    allow-self-register: ${ALLOW_SELF_REGISTER:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.aisec.backend: INFO
    org.hibernate.SQL: WARN
    # SECURITY: never log SQL values in production — set to WARN or OFF
    org.hibernate.orm.jdbc.bind: WARN
