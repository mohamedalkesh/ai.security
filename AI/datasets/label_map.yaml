# Canonical label taxonomy — v5 (15 classes).
# Web Attack split into 3 specific classes.
# Added: SQL Injection, XSS, Ransomware, Cryptomining, DNS Tunneling, Lateral Movement.

canonical:
  Benign:
    - benign
    - BENIGN
    - Normal
    - normal

  # ── Volumetric attacks ────────────────────────────────────────────────────
  DDoS:
    - ddos
    - "DDoS Hulk"
    - "DDoS GoldenEye"
    - "DDoS LOIC"
    - "DDoS HOIC"
    - Generic

  DoS:
    - dos
    - "DoS Hulk"
    - "DoS Slowhttptest"
    - "DoS slowloris"
    - "DoS GoldenEye"
    - Heartbleed
    - Fuzzers

  # ── Reconnaissance ────────────────────────────────────────────────────────
  "Port Scan":
    - portscan
    - "Port Scan"
    - Reconnaissance
    - Recon
    - Scanning

  # ── Credential attacks ────────────────────────────────────────────────────
  "Brute Force":
    - "FTP-Patator"
    - "SSH-Patator"
    - "Brute Force"
    - Password
    - "Web Attack - Brute Force"

  # ── Malware families ──────────────────────────────────────────────────────
  Bot:
    - bot
    - Botnet
    - Worms
    - Malware
    - "C&C"
    - Theft

  Ransomware:
    - Ransomware
    - ransomware
    - Cryptolocker
    - WannaCry
    - Ryuk

  Cryptomining:
    - Cryptomining
    - cryptomining
    - Cryptojacking
    - Miner
    - "Crypto Mining"

  # ── Web attacks (now split) ───────────────────────────────────────────────
  "SQL Injection":
    - "Web Attack - SQL Injection"
    - "SQL Injection"
    - "sql_injection"
    - Injection
    - SQLi

  XSS:
    - "Web Attack - XSS"
    - XSS
    - "Cross-Site Scripting"
    - xss

  "Web Attack":                      # residual generic web attacks
    - "Web Attack"
    - Exploits
    - "Web Attack - Brute Force"     # fallback if not mapped above

  # ── Network intrusion ─────────────────────────────────────────────────────
  Infiltration:
    - Infiltration
    - Backdoor
    - Shellcode
    - Reverse_shell
    - Man_in_the_middle
    - Tor

  "Lateral Movement":
    - "Lateral Movement"
    - lateral_movement
    - "Pass the Hash"
    - "Pass the Ticket"
    - SMB

  "DNS Tunneling":
    - "DNS Tunneling"
    - dns_tunneling
    - DNS
    - "DNS Exfil"

  # ── Low-level network ─────────────────────────────────────────────────────
  "ICMP Flood":
    - "ICMP-Flood"
    - "Ping Flood"
    - "ICMP Flood"

  Unknown:
    - Unknown

default_label: Unknown

# ── Dataset-specific overrides ────────────────────────────────────────────────
